# Railway service config for Paperclip Holding
# https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"

[deploy]
# npm start = bin/start.sh:
#   1. onboard (idempotent — mevcut config varsa atlar)
#   2. config.json'u $PORT + 0.0.0.0 host + ALLOWED_HOSTNAME ile patch'ler
#   3. paperclipai run --bind lan
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Healthcheck disabled: Paperclip --bind lan auth-gate'liyor /api/health'i (403 Forbidden)
# Railway healthcheck unauth, sürekli fail eder → deploy "unhealthy" sayılır → traffic switch yapılmaz.
# Process restart policy yeterli; ileride Paperclip public /health endpoint sağlarsa açılır.
# healthcheckPath = "/api/health"
# healthcheckTimeout = 300

# Environment variables — these MUST be set in Railway dashboard, not committed:
#   ANTHROPIC_API_KEY  - Anthropic Console API key (kredi yüklü olsun)
#   AUTH_SECRET        - openssl rand -hex 32 ile yarat
#   DATABASE_URL       - Railway Postgres add-on otomatik sağlar
#   BIND               - "lan" production için
#   ALLOWED_HOSTNAME   - Railway custom/auto domain (ör. paperclip-holding.up.railway.app)
#   PORT               - Railway otomatik atar; Paperclip $PORT'u okur

# Volume for persistent Paperclip data (~/.paperclip)
# Railway dashboard'dan Volume mount: /root/.paperclip → 1GB minimum
